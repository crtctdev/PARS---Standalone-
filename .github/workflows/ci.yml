name: CI

on:
  push:
    branches: ["main", "Main"]
  pull_request:
    branches: ["main", "Main"]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pandas numpy pytest pyodbc msal requests toml

      - name: Run tests
        run: pytest tests/ -v
